<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#141414" />
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#10b981" stroke-opacity="0.15" stroke-width="8" />

  <g transform="translate(14, 16)">
    <!-- U -->
    <path d="M 150 190 V 270 A 46 46 0 0 0 242 270 V 190" 
          fill="none" stroke="url(#emerald)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    
    <!-- B -->
    <path d="M 288 170 V 310" 
          fill="none" stroke="#ffffff" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 288 170 H 338 A 35 35 0 0 1 338 240 H 288" 
          fill="none" stroke="#ffffff" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 288 240 H 348 A 35 35 0 0 1 348 310 H 288" 
          fill="none" stroke="#ffffff" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
