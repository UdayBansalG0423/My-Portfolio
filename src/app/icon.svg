<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="24" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="#10b981" stroke-opacity="0.2" stroke-width="8" />
  
  <!-- Outer subtle glow for the spark -->
  <path d="M256 80 C256 210, 302 256, 432 256 C302 256, 256 302, 256 432 C256 302, 210 256, 80 256 C210 256, 256 210, 256 80 Z" fill="#10b981" opacity="0.4" filter="url(#glow)" />
  
  <!-- Inner bright spark -->
  <path d="M256 120 C256 220, 292 256, 392 256 C292 256, 256 292, 256 392 C256 292, 220 256, 120 256 C220 256, 256 220, 256 120 Z" fill="url(#sparkGrad)" filter="url(#softGlow)" />
  
  <!-- Core highlight -->
  <circle cx="256" cy="256" r="32" fill="#ffffff" filter="url(#softGlow)" />
  <circle cx="256" cy="256" r="16" fill="#ffffff" />
</svg>
